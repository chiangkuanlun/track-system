services:
  app:
    image: node:22-bookworm
    volumes:
      - ..:/workspaces/track-system:cached
    command: sleep infinity
    environment:
      PORT: "3000"
      MONGO_URI: mongodb://mongo:27017/track-system
      JWT_SECRET: codespaces-public-test-secret-change-before-production
      CORS_ORIGINS: "*"
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
