<mat-toolbar class="flex justify-between items-center px-4 shadow-md relative z-50 !bg-indigo-900 text-white">
  
  <div class="flex items-center gap-3 cursor-pointer" routerLink="/dashboard">
    <div class="bg-white/20 p-2 rounded-lg backdrop-blur-sm">
      <mat-icon class="text-white scale-110">emoji_events</mat-icon>
    </div>
    <span class="font-bold text-xl tracking-wide text-white">田徑賽務系統</span>
  </div>

  <div *ngIf="user" class="flex items-center gap-3">
    
    <div class="hidden md:flex flex-col items-end mr-2">
      <span class="text-sm font-bold text-white leading-none">{{ user.name }}</span>
      <span class="text-[10px] text-indigo-100 bg-black/20 px-2 py-0.5 rounded-full mt-1 border border-white/10">
        {{ getRoleName(user.role) }}
      </span>
    </div>

    <button mat-icon-button [matMenuTriggerFor]="userMenu" class="bg-white/10 hover:bg-white/20 transition-colors border border-white/20">
      <mat-icon class="text-white">person</mat-icon>
    </button>
    
    <mat-menu #userMenu="matMenu" class="mt-2">
      <div class="px-4 py-3 border-b border-gray-100 outline-none min-w-[160px]">
        <div class="font-bold text-gray-800">{{ user.name }}</div>
        <div class="text-xs text-gray-500">@{{ user.username }}</div>
      </div>
      
      <button mat-menu-item routerLink="/dashboard">
        <mat-icon class="text-gray-500">dashboard</mat-icon>
        <span>儀表板</span>
      </button>
      
      <button mat-menu-item (click)="logout()" class="text-red-600">
        <mat-icon class="text-red-500">logout</mat-icon>
        <span>登出</span>
      </button>
    </mat-menu>
  </div>

  <div *ngIf="!user" class="text-xs text-white/50 border border-white/30 px-2 py-1 rounded">
    未登入
  </div>

</mat-toolbar>
