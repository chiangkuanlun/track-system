<app-header></app-header>

<div class="container mx-auto p-4 md:p-6 fade-in max-w-[1600px] h-[calc(100vh-80px)] flex flex-col">

  <div class="flex items-center gap-4 mb-4 shrink-0">
    <button mat-icon-button (click)="goBack()" class="bg-white shadow-sm border border-gray-200 hover:bg-gray-50">
      <mat-icon>arrow_back</mat-icon>
    </button>
    <div>
      <h1 class="text-2xl font-bold text-gray-800 my-0">成績總表</h1>
      <p class="text-gray-500 text-sm mt-0.5 font-bold">{{ competitionName }}</p>
    </div>
  </div>

  <div *ngIf="isLoading" class="flex justify-center py-20">
    <mat-icon class="animate-spin text-gray-400 text-4xl">sync</mat-icon>
  </div>

  <div *ngIf="!isLoading" class="flex-1 grid grid-cols-12 gap-6 overflow-hidden">
    
    <div class="col-span-12 md:col-span-3 lg:col-span-2 flex flex-col h-full bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
      <div class="p-3 bg-gray-50 border-b border-gray-200 font-bold text-gray-600 text-sm">
        選擇組別
      </div>
      <div class="overflow-y-auto custom-scrollbar flex-1">
        <mat-nav-list class="pt-0">
          <a mat-list-item 
             *ngFor="let group of groups" 
             (click)="selectGroup(group._id)"
             [class.bg-blue-50]="selectedGroupId === group._id"
             [class.text-blue-700]="selectedGroupId === group._id"
             [class.border-l-4]="selectedGroupId === group._id"
             [class.border-blue-500]="selectedGroupId === group._id"
             class="hover:bg-gray-50 transition border-l-4 border-transparent text-sm">
            <span matListItemTitle [class.font-bold]="selectedGroupId === group._id">
              {{ group.name }}
            </span>
            <span matListItemMeta *ngIf="selectedGroupId === group._id">
              <mat-icon class="text-blue-500 text-sm">chevron_right</mat-icon>
            </span>
          </a>
        </mat-nav-list>
      </div>
    </div>

    <div class="col-span-12 md:col-span-9 lg:col-span-10 flex flex-col h-full bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
      
      <div class="p-3 bg-gray-50 border-b border-gray-200 font-bold text-gray-600 text-sm flex justify-between items-center">
        <span>競賽項目與成績</span>
        <span class="text-xs text-gray-400 font-normal">點擊有顏色的按鈕查看成績</span>
      </div>

      <div class="overflow-y-auto custom-scrollbar flex-1 p-4 md:p-6 bg-gray-50/30">
        
        <div *ngIf="isLoadingEvents" class="flex justify-center py-20">
          <mat-spinner diameter="30"></mat-spinner>
        </div>

        <div *ngIf="!isLoadingEvents && currentEvents.length > 0" class="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-4">
          
          <div *ngFor="let event of currentEvents" 
               class="bg-white p-4 rounded-lg border border-gray-200 shadow-sm hover:shadow-md transition">
            
            <div class="flex justify-between items-center mb-3">
              <h3 class="font-bold text-gray-800 text-lg m-0">{{ event.name }}</h3>
              <span class="text-xs bg-gray-100 text-gray-500 px-2 py-0.5 rounded">
                {{ event.type === 'field' ? '田賽' : (event.type === 'relay' ? '接力' : '徑賽') }}
              </span>
            </div>

            <div class="flex flex-wrap gap-2">
              <button *ngFor="let round of event.roundButtons"
                      mat-flat-button
                      [disabled]="!round.isActive"
                      (click)="round.isActive ? openResultDialog(event, round.name) : null"
                      [color]="round.isActive ? 'primary' : ''"
                      [class.opacity-50]="!round.isActive"
                      [class.cursor-not-allowed]="!round.isActive"
                      class="!rounded-full !px-4 !h-8 text-xs font-bold transition-all"
                      [ngClass]="{
                        'bg-blue-600 text-white hover:bg-blue-700 shadow-sm': round.isActive,
                        'bg-gray-100 text-gray-400 shadow-none': !round.isActive
                      }">
                
                <span class="flex items-center gap-1">
                  {{ round.name }}
                  <mat-icon *ngIf="round.isActive" class="text-[12px] w-3 h-3 leading-3">check_circle</mat-icon>
                  <mat-icon *ngIf="!round.isActive" class="text-[12px] w-3 h-3 leading-3">radio_button_unchecked</mat-icon>
                </span>

              </button>
            </div>

            <div *ngIf="hasNoResults(event.roundButtons)" class="mt-3 text-xs text-gray-400 text-center py-2 bg-gray-50 rounded border border-dashed border-gray-200">
              尚未建立成績
            </div>

          </div>

        </div>

        <div *ngIf="!isLoadingEvents && currentEvents.length === 0" class="flex flex-col items-center justify-center h-full text-gray-400">
          <mat-icon class="text-5xl mb-2 opacity-20">playlist_remove</mat-icon>
          <p>此組別尚無競賽項目</p>
        </div>

      </div>
    </div>

  </div>
</div>
